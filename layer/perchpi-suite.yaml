# METABEGIN
# X-Env-Layer-Name: perchpi-suite
# X-Env-Layer-Category: custom
# X-Env-Layer-Desc: perchpi image suite for Raspberry Pi 4. Default pi user,
#  WiFi disabled, USB CDC gadget mode (g_cdc), hostname set to perchpi,
#  git clone of app repo into /home/pi/app.
# X-Env-Layer-Version: 2.0.0
# X-Env-Layer-Requires: debian-trixie-arm64-multi,
#  rpi-debian-trixie,
#  rpi-misc-utils,
#  rpi-essential-base,
#  rpi-misc-skel,
#  rpi-user-credentials,
#  systemd-net-min,
#  rpi-connect-lite,
#  wireless-regulatory,
#  openssh-server,
#  systemd-timesyncd
# METAEND
---
mmdebstrap:
  packages:
    - nano
    - git
    - python3-numpy
    - python3-flask
    - python3-pip
    - network-manager
    - dnsmasq
    - rpi-usb-gadget
  customize-hooks:
    - echo "$IGconf_device_hostname" > $1/etc/hostname
    - |-
      # NetworkManager connection: shared ethernet on eth0 (NAT + DHCP server at 192.168.10.1/24)
      # Equivalent to: nmcli connection add type ethernet ifname eth0 con-name 'direct-link' \
      #   ipv4.method shared ipv4.addresses 192.168.10.1/24
      mkdir -p $1/etc/NetworkManager/system-connections
      cat > $1/etc/NetworkManager/system-connections/direct-link.nmconnection <<-EOF
      [connection]
      id=direct-link
      type=ethernet
      interface-name=eth0
      autoconnect=true

      [ethernet]

      [ipv4]
      method=shared
      address1=192.168.10.1/24

      [ipv6]
      method=ignore
      EOF
      chmod 600 $1/etc/NetworkManager/system-connections/direct-link.nmconnection
    - $BDEBSTRAP_HOOKS/enable-units "$1" NetworkManager
    - |-
      # Autologin on virtual console (tty1)
      mkdir -p $1/etc/systemd/system/getty@tty1.service.d
      cat > $1/etc/systemd/system/getty@tty1.service.d/autologin.conf <<-EOF
      [Service]
      ExecStart=
      ExecStart=-/sbin/agetty --autologin $IGconf_device_user1 --noclear %I \$TERM
      EOF

      # Autologin on USB gadget serial port (ttyGS0 from g_cdc)
      mkdir -p $1/etc/systemd/system/serial-getty@ttyGS0.service.d
      cat > $1/etc/systemd/system/serial-getty@ttyGS0.service.d/autologin.conf <<-EOF
      [Service]
      ExecStart=
      ExecStart=-/sbin/agetty --autologin $IGconf_device_user1 115200 %I \$TERM
      EOF
      $BDEBSTRAP_HOOKS/enable-units "$1" serial-getty@ttyGS0
    - |-
      # Enable USB Gadget ON
      $BDEBSTRAP_HOOKS/enable-units "$1" rpi-usb-gadget on
    - |-
      # Clone app repository into pi home directory on the build host, then copy in
      TMPDIR=$(mktemp -d)
      git clone https://github.com/muralimani/test-http-sever.git "$TMPDIR/app"
      cp -r "$TMPDIR/app" "$1/home/$IGconf_device_user1/app"
      chroot "$1" chown -R "$IGconf_device_user1:$IGconf_device_user1" "/home/$IGconf_device_user1/app"
      rm -rf "$TMPDIR"
    - |-
      # Clone Perch Onnx file to a specific folder
      mkdir -p $1/usr/local/share/perch
      wget -O $1/usr/local/share/perch/perch_v2.onnx https://huggingface.co/justinchuby/Perch-onnx/resolve/main/perch_v2.onnx
